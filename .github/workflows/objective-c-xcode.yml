name: Build Tweak

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@v1
        with:
          cache: false

      - name: Build package
        run: make package FINALPACKAGE=1

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: tweak-deb
          path: packages/*.deb

      - name: Upload .dylib
        uses: actions/upload-artifact@v4
        with:
          name: tweak-dylib
          path: .theos/obj/*.dylib
